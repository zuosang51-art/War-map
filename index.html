<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8" />
  <title>War Map System</title>

  <!-- Leaflet 核心样式 -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <!-- 自定义样式 -->
  <link rel="stylesheet" href="style.css"/>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
    }

    #map {
      height: 100vh;
      width: 100%;
    }

    /* HUD */
    .hud {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: #00ffe1;
      background: rgba(0,0,0,0.4);
      padding: 10px;
      border: 1px solid rgba(0,255,225,0.3);
      backdrop-filter: blur(8px);
      font-family: Arial;
      font-size: 12px;
    }
  </style>
</head>

<body>

<!-- HUD -->
<div class="hud">
  WAR INTELLIGENCE SYSTEM<br/>
  STATUS: LIVE
</div>

<!-- 地图容器 -->
<div id="map"></div>

<!-- =========================
  1️⃣ Leaflet核心库
========================= -->
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- =========================
  2️⃣ 更稳定KML支持（推荐）
========================= -->
<script src="https://unpkg.com/leaflet-omnivore/leaflet-omnivore.min.js"></script>

<!-- =========================
  3️⃣ 你的主逻辑
========================= -->
<script src="app.js"></script>

</body>
</html>
